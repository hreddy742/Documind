services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11440:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6340:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: documind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5442:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8020:8000"
    env_file: .env
    depends_on:
      - ollama
      - qdrant
      - postgres
    volumes:
      - ./bm25_cache:/app/bm25_cache

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3010:3000"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: ""

volumes:
  ollama_data:
  qdrant_data:
  pg_data:
